services:
  - type: web
    name: finsight-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEMO_MODE
        value: "true"
      - key: FRONTEND_URL
        value: https://kaggle-gemma4.vercel.app
      - key: FRONTEND_ORIGINS
        value: https://kaggle-gemma4.vercel.app
      - key: FRONTEND_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: OLLAMA_MODEL
        value: gemma4:e2b
      - key: OLLAMA_TIMEOUT_S
        value: "120"
      - key: PAPER_CAPITAL
        value: "100000"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: OLLAMA_HOST
        sync: false
      - key: KITE_API_KEY
        sync: false
      - key: KITE_API_SECRET
        sync: false
      - key: KITE_REDIRECT_URL
        sync: false
