<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finsight OS · Cover Image (1280×720)</title>
<style>
  html, body { margin: 0; padding: 0; background: #1A1814; }
  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  /* The actual cover canvas — exactly 1280×720 so Kaggle / YouTube don't recrop */
  .canvas {
    width: 1280px;
    height: 720px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .help {
    position: fixed; top: 16px; left: 16px;
    background: #ffffff; color: #1A1814;
    padding: 8px 12px; border-radius: 6px;
    font-size: 12px; font-family: monospace;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<div class="help">
  Cover image · 1280×720 · Right-click → Save image (or screenshot at 100% zoom).
</div>

<div class="canvas">
<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" font-family="DM Sans, -apple-system, sans-serif">

  <!-- ── Background ─────────────────────────────────────────────────── -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#FFFBF5"/>
      <stop offset="0.55" stop-color="#F5F4F0"/>
      <stop offset="1"    stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F97316"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="bumpFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DC2626"/>
      <stop offset="1" stop-color="#991B1B"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid texture (decorative) -->
  <g stroke="#E8E5DF" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="540" x2="1280" y2="540"/>
    <line x1="320"  y1="0" x2="320"  y2="720"/>
    <line x1="640"  y1="0" x2="640"  y2="720"/>
    <line x1="960"  y1="0" x2="960"  y2="720"/>
  </g>

  <!-- ── Brand row (top) ────────────────────────────────────────────── -->
  <g>
    <rect x="60" y="48" width="44" height="44" rx="11" fill="url(#orange)"/>
    <path d="M82 88 L82 88 C82 88 96 79 96 67 L96 56 L82 50 L68 56 L68 67 C68 79 82 88 82 88 Z"
          fill="#fff" transform="translate(0,-12)"/>
    <text x="120" y="74" font-size="22" font-weight="800" fill="#1A1814" letter-spacing="-0.01em">
      Finsight OS
    </text>
    <text x="120" y="92" font-size="12" fill="#9B9890" letter-spacing="0.04em">
      BEHAVIORAL GUARDIAN · BUILT ON GEMMA 4
    </text>

    <!-- Top right pills -->
    <g transform="translate(1220, 76)">
      <g transform="translate(-130,-18)">
        <rect width="120" height="26" rx="13" fill="#FFF7ED" stroke="#FED7AA"/>
        <text x="60" y="17" font-size="11" font-weight="700" fill="#C2410C" text-anchor="middle"
              letter-spacing="0.06em">EDGE AI · 100% LOCAL</text>
      </g>
      <g transform="translate(-280,-18)">
        <rect width="140" height="26" rx="13" fill="#F0FDF4" stroke="#BBF7D0"/>
        <text x="70" y="17" font-size="11" font-weight="700" fill="#15803D" text-anchor="middle"
              letter-spacing="0.06em">KAGGLE · GEMMA 4</text>
      </g>
    </g>
  </g>

  <!-- ── Hero text (left) ───────────────────────────────────────────── -->
  <g>
    <text x="60" y="220" font-size="14" font-weight="700" fill="#F97316" letter-spacing="0.08em">
      THE MINDFUL SPEED BUMP
    </text>

    <text x="60" y="296" font-size="58" font-weight="800" fill="#1A1814" letter-spacing="-0.02em">
      An AI guardrail
    </text>
    <text x="60" y="358" font-size="58" font-weight="800" fill="#1A1814" letter-spacing="-0.02em">
      for India's <tspan fill="#F97316">9.6 million</tspan>
    </text>
    <text x="60" y="420" font-size="58" font-weight="800" fill="#1A1814" letter-spacing="-0.02em">
      retail F&amp;O traders.
    </text>

    <text x="60" y="468" font-size="18" fill="#6B6860" letter-spacing="0">
      Privacy-first edge AI · Runs on a four-year-old laptop · Speaks four languages
    </text>

    <!-- Stats strip -->
    <g transform="translate(60, 530)">
      <!-- Stat 1 -->
      <text x="0"   y="0"  font-size="32" font-weight="800" fill="#1A1814" font-variant-numeric="tabular-nums">9.6M</text>
      <text x="0"   y="22" font-size="11" font-weight="600" fill="#9B9890" letter-spacing="0.06em">RETAIL TRADERS</text>

      <text x="160" y="0"  font-size="32" font-weight="800" fill="#DC2626" font-variant-numeric="tabular-nums">91%</text>
      <text x="160" y="22" font-size="11" font-weight="600" fill="#9B9890" letter-spacing="0.06em">LOST MONEY</text>

      <text x="290" y="0"  font-size="32" font-weight="800" fill="#1A1814" font-variant-numeric="tabular-nums">₹1,05,603 Cr</text>
      <text x="290" y="22" font-size="11" font-weight="600" fill="#9B9890" letter-spacing="0.06em">FY 2024–25 LOSSES</text>

      <text x="540" y="0"  font-size="32" font-weight="800" fill="#16A34A" font-variant-numeric="tabular-nums">12s</text>
      <text x="540" y="22" font-size="11" font-weight="600" fill="#9B9890" letter-spacing="0.06em">COGNITIVE INTERRUPT</text>
    </g>

    <!-- Tag at the bottom -->
    <text x="60" y="660" font-size="13" font-weight="600" fill="#9B9890">
      Source: SEBI F&amp;O Study FY 2024-25
    </text>
  </g>

  <!-- ── Speed Bump modal mock (right) ──────────────────────────────── -->
  <g transform="translate(745, 145)" filter="url(#cardShadow)">
    <!-- Card -->
    <rect x="0" y="0" width="475" height="430" rx="20"
          fill="#ffffff" stroke="#FECACA" stroke-width="1.5"/>

    <!-- Warning icon circle -->
    <circle cx="237.5" cy="58" r="32" fill="#FEF2F2" stroke="#FECACA" stroke-width="2.5"/>
    <path d="M225 70 L237 50 L249 70 Z M237 56 L237 64 M237 67 L237 67.5"
          stroke="#DC2626" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Title -->
    <text x="237.5" y="120" font-size="22" font-weight="800" fill="#1A1814" text-anchor="middle"
          letter-spacing="-0.01em">Mindful Speed Bump</text>
    <text x="237.5" y="148" font-size="13" fill="#6B6860" text-anchor="middle">
      Gemma 4 detected <tspan fill="#DC2626" font-weight="700">Revenge Trading</tspan> · score
      <tspan fill="#DC2626" font-weight="700">892/1000</tspan>
    </text>

    <!-- Phrase box -->
    <g transform="translate(28, 174)">
      <rect width="419" height="100" rx="12" fill="#FEF2F2" stroke="#FECACA"/>
      <text x="20" y="26" font-size="10" font-weight="700" fill="#DC2626" letter-spacing="0.06em">
        TYPE THIS EXACTLY:
      </text>
      <text x="20" y="56" font-size="14" fill="#991B1B" font-style="italic">
        "I am trading to recover losses,
      </text>
      <text x="20" y="78" font-size="14" fill="#991B1B" font-style="italic">
        not following my plan today."
      </text>
    </g>

    <!-- Hindi line (multi-language proof) -->
    <text x="237.5" y="294" font-size="13" fill="#B91C1C" text-anchor="middle" font-style="italic">
      मैं नुकसान वसूलने के लिए ट्रेड कर रहा हूँ
    </text>

    <!-- Input field -->
    <g transform="translate(28, 312)">
      <rect width="419" height="40" rx="8" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
      <text x="16" y="26" font-size="13" fill="#15803D"
            font-family="DM Mono, Courier New, monospace">
        I am trading to recover losses, not following my plan today.
      </text>
    </g>

    <!-- Progress bar -->
    <g transform="translate(28, 364)">
      <rect width="350" height="3" rx="2" fill="#E8E5DF"/>
      <rect width="350" height="3" rx="2" fill="#16A34A"/>
      <text x="395" y="6" font-size="12" font-weight="700" fill="#16A34A" text-anchor="middle">✓ Match</text>
    </g>

    <!-- Action buttons -->
    <g transform="translate(28, 380)">
      <rect x="0"   y="0" width="130" height="36" rx="8" fill="#fff" stroke="#D0CCC4"/>
      <text x="65"  y="23" font-size="13" fill="#6B6860" text-anchor="middle">Cancel</text>

      <rect x="148" y="0" width="271" height="36" rx="8" fill="#DC2626"/>
      <text x="284" y="23" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">✓ Confirm BUY</text>
    </g>
  </g>

  <!-- ── Floating "edge AI" annotations connecting modal to brand ─── -->
  <g font-size="10" font-weight="600" fill="#9B9890" letter-spacing="0.05em">
    <text x="745" y="135" text-anchor="start">↓ LIVE FROM THE APP · gemma4 via ollama · 100% on-device</text>
  </g>
</svg>
</div>

</body>
</html>
